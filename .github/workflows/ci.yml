name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/cache@v4
        with:
          path: .cache/solver
          key: solver-htm-v1-${{ runner.os }}
      - run: uv sync --project backend --locked
      - run: make solver-table
      - run: uv run --project backend ruff check backend
      - run: uv run --project backend ruff format --check backend
      - run: RUBICKS_SOLVER_CACHE_DIR="$PWD/.cache" uv run --project backend pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run test
      - run: npm --prefix frontend run build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/cache@v4
        with:
          path: .cache/solver
          key: solver-htm-v1-${{ runner.os }}
      - run: uv sync --project backend --locked
      - run: npm ci --prefix frontend
      - run: make solver-table
      - run: npx --prefix frontend playwright install --with-deps chromium webkit
      - run: make test-e2e
